<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAIRSALON FULEN（フレン）| 旭川市東光の美容室・オンラインAGA診療提携</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-primary: #1e3a8a;
            --color-secondary: #f4eee1;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-accent: #3eb4c8;
        }
        
        body { font-family: 'Noto Sans JP', sans-serif; color: #333333; background-color: #ffffff; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .font-serif-jp { font-family: 'Noto Serif JP', serif; }
        .font-elegant { font-family: 'Cormorant Garamond', serif; }

        .hero-image {
            background-image: linear-gradient(rgba(30, 58, 138, 0.3), rgba(0, 0, 0, 0.5)), url('https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/1615747/0a6dddaf393fe5b9473d1eb18c5215c0_504b1f14f7d057302dd58ce7c3cb25f9.jpg?width=1600');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
        }

        .retro-border { border: 2px solid #1e3a8a; box-shadow: 4px 4px 0px #3eb4c8; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.2em; }
        .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }
        html { scroll-behavior: smooth; }
        .deco-line::after { content: ''; display: block; width: 2px; height: 40px; background-color: #1e3a8a; margin: 16px auto 0; }
        @media (min-width: 768px) { .deco-line::after { height: 60px; margin: 20px auto 0; } }
        .menu-dot { flex-grow: 1; border-bottom: 1px dotted #ccc; margin: 0 10px; opacity: 0.6; }

        /* ロゴ画像の鮮明度と透過維持の設定 */
        #logo-img {
            max-height: 100%;
            width: auto;
            object-contain: center;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <header id="header" class="fixed w-full z-50 transition-all duration-500 bg-transparent py-4">
        <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-12">
            <div class="flex justify-between items-center h-14 md:h-16">
                <div class="flex-shrink-0 flex items-center h-full">
                    <a href="#" class="h-12 md:h-16 inline-block">
                        <img src="fulen.rg.png" alt="HAIRSALON FULEN" id="logo-img">
                    </a>
                </div>
                <nav class="hidden md:flex space-x-8 items-center">
                    <a href="#concept" class="text-sm font-elegant tracking-widest text-white hover:text-[#3eb4c8] transition nav-link">Concept</a>
                    <a href="#aga" class="text-sm font-elegant tracking-widest text-white hover:text-[#3eb4c8] transition nav-link">AGA/FAGA</a>
                    <a href="#menu" class="text-sm font-elegant tracking-widest text-white hover:text-[#3eb4c8] transition nav-link">Menu</a>
                    <a href="#stylist" class="text-sm font-elegant tracking-widest text-white hover:text-[#3eb4c8] transition nav-link">Stylist</a>
                    <a href="#access" class="text-sm font-elegant tracking-widest text-white hover:text-[#3eb4c8] transition nav-link">Access</a>
                    <a href="https://kuroko-partner.github.io/fulen-reserve/" class="bg-[#3eb4c8] text-white px-6 py-2 text-sm hover:scale-105 transition nav-btn font-bold rounded-full shadow-lg">
                        ネット予約
                    </a>
                </nav>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-white focus:outline-none p-2 transition"><i class="fa-solid fa-bars text-2xl"></i></button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="fixed inset-0 bg-[#1e3a8a] z-40 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300">
            <button id="mobile-close-btn" class="absolute top-6 right-6 text-white text-3xl"><i class="fa-solid fa-xmark"></i></button>
            <div class="flex flex-col items-center space-y-6 z-10">
                <img src="fulen.rg.png" alt="FULEN" class="h-16 mb-8" style="filter: brightness(0) invert(1);">
                <a href="#concept" class="text-xl font-elegant tracking-widest text-white uppercase">Concept</a>
                <a href="#aga" class="text-xl font-elegant tracking-widest text-white uppercase">AGA/FAGA</a>
                <a href="#menu" class="text-xl font-elegant tracking-widest text-white uppercase">Menu</a>
                <a href="#stylist" class="text-xl font-elegant tracking-widest text-white uppercase">Stylist</a>
                <a href="#access" class="text-xl font-elegant tracking-widest text-white uppercase">Access</a>
                <a href="https://kuroko-partner.github.io/fulen-reserve/" class="mt-8 bg-[#3eb4c8] text-white px-8 py-3 text-base font-bold tracking-wider uppercase rounded-full shadow-xl">ネット予約</a>
            </div>
        </div>
    </header>

    <section class="hero-image h-screen flex items-center justify-center px-4 relative">
        <div class="z-10 text-center w-full max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-5xl lg:text-6xl text-white font-serif-jp font-light mb-6 md:mb-8 tracking-[0.15em] md:tracking-[0.2em] leading-loose md:leading-relaxed">素晴らしい出会いをテーマに<br class="md:hidden">あなたの“なりたい”を叶える。</h1>
            <p class="text-[10px] md:text-sm text-gray-200 mb-12 font-light tracking-[0.2em] md:tracking-[0.3em] uppercase">HAIRSALON FULEN in Asahikawa</p>
        </div>
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <span class="text-white/60 text-[9px] font-elegant tracking-widest mb-3 uppercase">Scroll</span>
            <div class="w-[2px] h-10 bg-gradient-to-b from-white to-transparent rounded-full"></div>
        </div>
    </section>

    <footer class="bg-[#1e3a8a] py-12 md:py-20 text-center relative">
        <div class="max-w-7xl mx-auto px-6 text-white relative z-10">
            <img src="fulen.rg.png" alt="FULEN" class="h-16 mx-auto mb-10 md:mb-16" style="filter: brightness(0) invert(1);">
            <div class="flex justify-center space-x-8 md:space-x-10 mb-10 md:mb-16 text-gray-300 text-2xl md:text-3xl">
                <a href="#" class="hover:text-white transition duration-300"><i class="fa-solid fa-house"></i></a>
                <a href="https://www.instagram.com/fulen.asahikawa/" target="_blank" rel="noopener noreferrer" class="hover:text-[#3eb4c8] transition duration-300"><i class="fa-brands fa-instagram"></i></a>
            </div>
            <p class="text-[8px] md:text-[9px] text-gray-300 tracking-[0.4em] md:tracking-[0.5em] uppercase font-bold">© HAIRSALON FULEN. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="floating-btn" class="fixed bottom-6 right-4 md:bottom-8 md:right-8 z-40 opacity-0 translate-y-4 transition-all duration-700 pointer-events-none">
        <a href="https://kuroko-partner.github.io/fulen-reserve/" class="flex items-center justify-center bg-[#3eb4c8] text-white px-5 md:px-8 py-3 md:py-4 rounded-full shadow-2xl hover:scale-105 transition tracking-[0.1em] md:tracking-[0.2em] text-[10px] md:text-[11px] font-bold uppercase">
            <i class="fa-regular fa-calendar-check mr-2 md:mr-3 text-lg md:text-xl"></i> ネット予約<span class="hidden md:inline">はこちら</span>
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));

            const header = document.getElementById('header');
            const logoImg = document.getElementById('logo-img');
            const navLinks = document.querySelectorAll('.nav-link');
            const mobileBtnIcon = document.querySelector('#mobile-menu-btn i');
            const floatingBtn = document.getElementById('floating-btn');

            // ★ スクロール時のヘッダー制御（ロゴの白・紺切り替え）
            const handleScroll = () => {
                const scrolled = window.scrollY > 50;
                header.classList.toggle('bg-white/95', scrolled);
                header.classList.toggle('shadow-sm', scrolled);
                header.classList.toggle('py-2', scrolled);
                header.classList.toggle('py-4', !scrolled);
                
                if(!scrolled) {
                    // 背景透明時：ロゴを白抜きにする
                    logoImg.style.filter = "brightness(0) invert(1)";
                } else {
                    // 背景白時：ロゴを元の色に戻す
                    logoImg.style.filter = "none";
                }

                navLinks.forEach(link => {
                    link.classList.toggle('text-gray-700', scrolled);
                    link.classList.toggle('text-white', !scrolled);
                });
                if(mobileBtnIcon) {
                    mobileBtnIcon.classList.toggle('text-[#1e3a8a]', scrolled);
                    mobileBtnIcon.classList.toggle('text-white', !scrolled);
                }
                
                if(floatingBtn) {
                    floatingBtn.classList.toggle('opacity-0', !scrolled);
                    floatingBtn.classList.toggle('translate-y-4', !scrolled);
                    floatingBtn.classList.toggle('pointer-events-none', !scrolled);
                }
            };

            window.addEventListener('scroll', handleScroll);
            handleScroll(); // 初期読み込み時にも適用

            // モバイルメニュー制御
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const closeBtn = document.getElementById('mobile-close-btn');

            mobileBtn.addEventListener('click', () => {
                mobileMenu.classList.remove('hidden');
                setTimeout(() => mobileMenu.classList.remove('opacity-0'), 10);
            });

            const closeMenu = () => {
                mobileMenu.classList.add('opacity-0');
                setTimeout(() => mobileMenu.classList.add('hidden'), 300);
            };

            closeBtn.addEventListener('click', closeMenu);
            
             mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
        });
    </script>
</body>
</html>
